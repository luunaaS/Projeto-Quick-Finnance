# Configuração de testes - usa banco H2 em memória
spring.datasource.url=jdbc:h2:mem:qfintestdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
jwt.secret=testSecretKeyForJWTTokenGenerationAndValidation123456789
jwt.expiration=86400000

# Email desabilitado nos testes (modo dev)
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=
spring.mail.password=
app.mail.dev-mode=true
app.frontend.url=http://localhost:5173
